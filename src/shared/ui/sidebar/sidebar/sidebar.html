<img class="ml16 mb20 logo" src="/assets/images/login.svg" alt="login-logo">
<nav class="mb20">
  <ul class="main-menu-list">
<!--    legacy for @for-->
    <li *ngFor="let menuItem of menuItems">
      <button class="menu-item">
        <svg class="menu-icon" [icon]="menuItem.icon"></svg>
        <span>{{menuItem.label}}</span>
      </button>
    </li>
  </ul>
</nav>

<p class="medium-text mb20">Подписчики</p>

<!--track тоже самое что key в списка-->
@for (profile of subscribers$ | async; track profile.id) {
  <app-subscriber-card [profile]="profile"></app-subscriber-card>
}



<div class="mt20 to-subscribers">
  <a class="to-subscribers-link medium-text" [routerLink]="['/subscribers']"> Все подписчики
  </a>
  <svg icon="arrow" class="to-subscribers-link-icon"></svg>
</div>


<footer class="sidebar__footer">
  @if (me(); as me) {
    @if (me.avatarUrl) {
      <img [src]="me.avatarUrl | imgUrls" alt="avatar">
    } @else {
      <img src="/assets/images/avatar_placeholder.png" alt="avatar">
    }

    <span class="medium-text username-text">{{me.username }}</span>

    <a routerLink="settings">
      <svg class="settings-icon" height="13px" width="13px" icon="settings"></svg>
    </a>
  }
</footer>
