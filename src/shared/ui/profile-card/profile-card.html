@if (profile) {
<div class="profile-card">
  <div class="avatar-name">
    <img [src]="profile.avatarUrl | imgUrls" alt="avatar" class="profile-card__avatar">

    <div class="profile-card__name">
      <span class="h6">{{profile.firstName}} {{profile.lastName}}</span>
      <span class="subtitle">{{profile.username}}</span>
    </div>
  </div>
  <div class="profile-card__description">
    {{profile.description}}
  </div>
  <ul class="profile-card__tags">
    @for (tag of profile.stack; track tag) {
      <li class="skill-tag">{{tag}}</li>
    }
  </ul>

  <div class="profile-card__action-btns">
    <button class="btn">Подписаться</button>
  </div>
</div>
} @else {
  asd
}
